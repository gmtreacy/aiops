<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="260" fill="url(#glow)"/>
  <g font-family="ui-sans-serif, system-ui" fill="#ede9fe">
    <text x="80" y="140" font-size="28" fill="#c4b5fd">// inference</text>
    <text x="80" y="220" font-size="64" font-weight="800">vLLM on EKS</text>
    <text x="80" y="276" font-size="30" fill="#ddd6fe">Continuous batching, paged attention,</text>
    <text x="80" y="316" font-size="30" fill="#ddd6fe">and saturated GPUs.</text>
  </g>
  <g transform="translate(80,400)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#e9d5ff">
    <rect x="0" y="0" width="1040" height="160" rx="14" fill="#312e81" stroke="#6d28d9" stroke-width="2"/>
    <text x="20" y="36">$ helm upgrade --install vllm vllm/vllm \</text>
    <text x="20" y="68">    --set model=meta-llama/Llama-3-8B-Instruct \</text>
    <text x="20" y="100">    --set gpuMemoryUtilization=0.92 \</text>
    <text x="20" y="132">    --set tensorParallelSize=2</text>
  </g>
</svg>
